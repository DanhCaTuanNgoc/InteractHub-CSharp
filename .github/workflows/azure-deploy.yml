name: CI-CD Azure Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore API + tests
        run: |
          dotnet restore InteractHub.API/InteractHub.API.csproj
          dotnet restore InteractHub.Test/InteractHub.Test.csproj

      - name: Build API + tests
        run: |
          dotnet build InteractHub.API/InteractHub.API.csproj --no-restore -c Release
          dotnet build InteractHub.Test/InteractHub.Test.csproj --no-restore -c Release

      - name: Test
        run: dotnet test InteractHub.Test/InteractHub.Test.csproj --no-build -c Release --verbosity normal

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: interacthub-client/package-lock.json

      - name: Install frontend deps
        working-directory: interacthub-client
        run: npm ci

      - name: Build frontend
        working-directory: interacthub-client
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

  deploy-api:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish API
        run: dotnet publish InteractHub.API/InteractHub.API.csproj -c Release -o ./publish

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish

  deploy-frontend:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: interacthub-client
          output_location: dist
